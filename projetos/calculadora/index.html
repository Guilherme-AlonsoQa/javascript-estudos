<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Calculadora</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
                body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #1a1a2e; font-family: Arial, sans-serif; }
                    .calculadora { background-color: #16213e; border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 280px; }
                        .display { background-color: #0f3460; border-radius: 10px; padding: 15px; text-align: right; margin-bottom: 15px; }
                            .expressao { color: #a0a0b0; font-size: 0.9rem; min-height: 20px; }
                                .resultado { color: white; font-size: 2rem; font-weight: bold; word-break: break-all; }
                                    .botoes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
                                        button { background-color: #1a1a2e; color: white; border: none; border-radius: 8px; padding: 18px; font-size: 1.1rem; cursor: pointer; transition: background-color 0.2s; }
                                            button:hover { background-color: #0f3460; }
                                                .btn-operador { background-color: #e94560; }
                                                    .btn-operador:hover { background-color: #c73652; }
                                                        .btn-igual { background-color: #4caf50; grid-column: span 2; }
                                                            .btn-igual:hover { background-color: #388e3c; }
                                                                .btn-limpar { background-color: #ff9800; }
                                                                    .btn-limpar:hover { background-color: #e65100; }
                                                                      </style>
                                                                      </head>
                                                                      <body>
                                                                        <div class="calculadora">
                                                                            <div class="display">
                                                                                  <div class="expressao" id="expressao"></div>
                                                                                        <div class="resultado" id="resultado">0</div>
                                                                                            </div>
                                                                                                <div class="botoes">
                                                                                                      <button class="btn-limpar" onclick="limpar()">C</button>
                                                                                                            <button onclick="apagar()">DEL</button>
                                                                                                                  <button class="btn-operador" onclick="inserir('%')">%</button>
                                                                                                                        <button class="btn-operador" onclick="inserir('/')">÷</button>
                                                                                                                              <button onclick="inserir('7')">7</button>
                                                                                                                                    <button onclick="inserir('8')">8</button>
                                                                                                                                          <button onclick="inserir('9')">9</button>
                                                                                                                                                <button class="btn-operador" onclick="inserir('*')">x</button>
                                                                                                                                                      <button onclick="inserir('4')">4</button>
                                                                                                                                                            <button onclick="inserir('5')">5</button>
                                                                                                                                                                  <button onclick="inserir('6')">6</button>
                                                                                                                                                                        <button class="btn-operador" onclick="inserir('-')">-</button>
                                                                                                                                                                              <button onclick="inserir('1')">1</button>
                                                                                                                                                                                    <button onclick="inserir('2')">2</button>
                                                                                                                                                                                          <button onclick="inserir('3')">3</button>
                                                                                                                                                                                                <button class="btn-operador" onclick="inserir('+')">+</button>
                                                                                                                                                                                                      <button onclick="inserir('0')">0</button>
                                                                                                                                                                                                            <button onclick="inserir('.')">.</button>
                                                                                                                                                                                                                  <button class="btn-igual" onclick="calcular()">=</button>
                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                          <script src="app.js"></script>
                                                                                                                                                                                                                          </body>
                                                                                                                                                                                                                          </html>
